name: DC2290A-x Migration Workflow

on:
  workflow_dispatch:   # Allows manual trigger from GitHub Actions tab

jobs:
  migration-checklist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Migration Checklist
        run: |
          echo "## DC2290A-x Migration Checklist" > docs/migration-checklist.md
          echo "- Verify FPGA/microcontroller compatibility" >> docs/migration-checklist.md
          echo "- Confirm LVDS interface alignment" >> docs/migration-checklist.md
          echo "- Update reference voltage and timing circuits" >> docs/migration-checklist.md
          echo "- Replace legacy demo software with ADI evaluation suite" >> docs/migration-checklist.md
          echo "- Document calibration differences per variant" >> docs/migration-checklist.md
          echo "- Validate data capture with DC718 board" >> docs/migration-checklist.md

      - name: Create Comparison Table
        run: |
          echo "| Variant | Resolution | Sample Rate | Interface | Notes |" > docs/comparison-table.md
          echo "|---------|------------|-------------|-----------|-------|" >> docs/comparison-table.md
          echo "| DC2290A-A | 18-bit | 15 Msps | LVDS | Needs FPGA upgrade |" >> docs/comparison-table.md
          echo "| DC2290A-B | 16-bit | 15 Msps | LVDS | Driver update required |" >> docs/comparison-table.md
          echo "| DC2290A-C | 18-bit | 12 Msps | LVDS | Timing calibration |" >> docs/comparison-table.md
          echo "| DC2290A-D | 16-bit | 12 Msps | LVDS | Documentation alignment |" >> docs/comparison-table.md
          echo "| DC2290A-E | 18-bit | 10 Msps | LVDS | Performance benchmarking |" >> docs/comparison-table.md
          echo "| DC2290A-F | 16-bit | 10 Msps | LVDS | Legacy software replacement |" >> docs/comparison-table.md

      - name: Commit and Push Outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/migration-checklist.md docs/comparison-table.md
          git commit -m "Generated migration checklist and comparison table"
          git push